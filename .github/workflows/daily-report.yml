name: Daily Emocje.TV Report

on:
  schedule:
    # Codziennie o 06:00 UTC (07:00 czasu polskiego)
    - cron: '0 6 * * *'
  workflow_dispatch: # Pozwala na ręczne uruchomienie testowe

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wymagane do zapisywania sent_messages.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node run-daily.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_messages.json || true
          git commit -m "chore: update sent_messages.json [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
